<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma da Morte</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .container-imagem {
            max-width: 500px;
            width: 90%;
            border: 1px solid #333;
            padding: 10px;
            background: #050505;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%) contrast(120%);
            transition: filter 0.5s;
        }

        img:hover {
            filter: grayscale(0%) contrast(100%);
        }

        .input-area {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="text"] {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid #555;
            color: white;
            padding: 10px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 250px;
            transition: border-bottom 0.3s;
        }

        input[type="text"]:focus {
            border-bottom: 1px solid white;
        }

        button {
            margin-top: 15px;
            background: transparent;
            color: #555;
            border: 1px solid #555;
            padding: 5px 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            color: white;
            border-color: white;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        #feedback {
            margin-top: 15px;
            font-size: 0.8rem;
            height: 20px;
        }
    </style>
</head>
<body>
    <!-- a 3ª -->
    <header>
        <h1>ग</h1>
    </header>

    <div class="container-imagem">
        <img src="aryabhata.jpg" alt="la capitale è la parola d'ordine">
    </div>

    <div class="input-area">
        <input type="text" id="resposta" placeholder="Digite sua resposta..." autocomplete="off">
        <button onclick="verificar()">Submeter</button>
        <p id="feedback"></p>
    </div>

    <script>
        function verificar() {
            const respostaUser = document.getElementById('resposta').value.toLowerCase().trim();
            const feedback = document.getElementById('feedback');
            
            const respostaCorreta = "amor"; 
            if (respostaUser === respostaCorreta) {
                feedback.style.color = "lime";
                feedback.innerText = "A porta se abre...";
                setTimeout(() => {
                    alert("Você decifrou o Enigma da Morte.");
                }, 500);
            } else {
                feedback.style.color = "red";
                feedback.innerText = "Silêncio absoluto.";
                document.getElementById('resposta').value = "";
            }
        }

        document.getElementById('resposta').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                verificar();
            }
        });
    </script>

</body>
</html>
